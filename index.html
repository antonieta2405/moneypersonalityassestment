<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Money Personality Assessment | FinPath by HUB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #cdeafe;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }
    .wrapper { max-width: 720px; width: 100%; }

    /* HEADER */
    .header {
      background: #263746;
      border-radius: 16px 16px 0 0;
      padding: 32px 36px 24px;
      text-align: center;
    }
    .header .hub-badge {
      display: inline-block;
      background: #0678d5;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .header h1 { color: #fff; font-size: 28px; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
    .header h1 span { color: #f3b921; }
    .header p { color: #cdeafe; font-size: 15px; line-height: 1.5; }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 0 0 16px 16px;
      padding: 36px;
      box-shadow: 0 8px 30px rgba(38,55,70,0.12);
    }

    /* INTRO */
    .intro { text-align: center; }
    .intro .meta {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
    }
    .intro .meta-item { display: flex; align-items: center; gap: 8px; color: #385263; font-size: 14px; }
    .intro .meta-icon { font-size: 20px; }
    .start-btn {
      background: #0678d5;
      color: #fff;
      border: none;
      padding: 16px 48px;
      font-size: 17px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .start-btn:hover { background: #0560b0; }
    .personality-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 28px 0;
    }
    .personality-pill {
      background: #cdeafe;
      color: #263746;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #385263; margin-bottom: 8px; }
    .progress-bar { height: 8px; background: #e3e3e3; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #0678d5; border-radius: 4px; transition: width 0.4s; }

    /* QUESTION */
    .question-num { font-size: 12px; color: #0678d5; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .question-text { font-size: 20px; font-weight: 900; color: #263746; margin-bottom: 24px; line-height: 1.4; }
    .answers { display: flex; flex-direction: column; gap: 12px; }
    .answer-btn {
      background: #fff;
      border: 2px solid #e3e3e3;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      font-size: 15px;
      color: #263746;
      cursor: pointer;
      transition: all 0.18s;
      font-family: Arial, sans-serif;
      line-height: 1.4;
    }
    .answer-btn:hover { border-color: #0678d5; background: #f0f8ff; color: #0678d5; transform: translateX(4px); }
    .answer-btn.selected { border-color: #0678d5; background: #cdeafe; font-weight: bold; }

    /* RESULT */
    .result { text-align: center; }
    .result-emoji { font-size: 64px; margin-bottom: 12px; }
    .result-badge {
      display: inline-block;
      background: #0678d5;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .result-type { font-size: 30px; font-weight: 900; color: #263746; margin-bottom: 16px; }
    .result-desc { font-size: 15px; color: #385263; line-height: 1.7; text-align: left; background: #f7fbff; border-left: 4px solid #0678d5; padding: 18px 20px; border-radius: 0 10px 10px 0; margin-bottom: 24px; }
    .result-tip { font-size: 14px; color: #263746; background: #cdeafe; padding: 14px 18px; border-radius: 10px; margin-bottom: 28px; text-align: left; }
    .result-tip strong { color: #0678d5; }

    .other-types-title { font-size: 13px; font-weight: bold; color: #385263; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
    .other-types { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .other-pill {
      background: #f7fbff;
      border: 2px solid #e3e3e3;
      color: #263746;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .other-pill:hover { border-color: #0678d5; background: #cdeafe; }
    .other-pill.active { border-color: #0678d5; background: #cdeafe; }

    .cta-section { border-top: 1px solid #e3e3e3; padding-top: 24px; }
    .cta-section p { font-size: 15px; color: #385263; margin-bottom: 16px; }
    .cta-btn {
      display: inline-block;
      background: #263746;
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .cta-btn:hover { background: #0678d5; }
    .retake-btn {
      background: none;
      border: 2px solid #e3e3e3;
      color: #385263;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 14px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      margin-left: 10px;
      transition: all 0.18s;
    }
    .retake-btn:hover { border-color: #0678d5; color: #0678d5; }

    /* FOOTER */
    .footer { text-align: center; padding: 18px 0 4px; font-size: 12px; color: #385263; }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .header { padding: 24px 20px 20px; }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="hub-badge">FinPath by HUB International</div>
    <h1>What's Your <span>Money Personality?</span></h1>
    <p>Discover how your mindset shapes your financial habits — and what to do next.</p>
  </div>
  <div class="card" id="app"></div>
  <div class="footer">FinPath by HUB International &nbsp;|&nbsp; finpathwellness.com</div>
</div>

<script>
// ── PERSONALITY TYPES ─────────────────────────────────────────────────────────
const types = {
  SPENDER: {
    key: 'SPENDER', label: 'The Spender / Impulsive', emoji: '🛍️',
    desc: 'You find joy in buying things and you live in the moment. Money feels like it is meant to be spent and enjoyed right now. Plans can feel restrictive and spontaneous purchases feel exciting. Your energy and generosity are real strengths, but overspending and debt can sneak up on you over time.',
    tip: '💡 Coach Tip: Try a 24-hour pause before any non-essential purchase. Create a small "fun fund" so you can enjoy spending guilt-free without derailing your goals.'
  },
  PENNY_PINCHER: {
    key: 'PENNY_PINCHER', label: 'The Penny Pincher', emoji: '🔒',
    desc: 'Security is everything to you. Saving is your superpower and you track every dollar. While your discipline is admirable, fear of spending can hold you back from enjoying life and investing in growth. You may be sitting on more than you need while missing opportunities.',
    tip: '💡 Coach Tip: Give yourself a guilt-free spending budget each month. Remind yourself that money is also a tool for living — not just a shield against uncertainty.'
  },
  AVOIDER: {
    key: 'AVOIDER', label: 'The Avoider', emoji: '🙈',
    desc: 'Finances feel overwhelming, stressful, or just too complicated to deal with right now. Avoidance feels like relief in the short term, but it can quietly create bigger problems — like missed bills, growing debt, or no plan for the future. You are not alone, and the first step is simpler than you think.',
    tip: '💡 Coach Tip: Start with just one small action: check one account balance today. You do not have to solve everything at once — momentum builds from small wins.'
  },
  PLANNER: {
    key: 'PLANNER', label: 'The Planner', emoji: '📋',
    desc: 'You are disciplined, goal-oriented, and future-focused. You probably have a budget, a savings plan, and maybe a spreadsheet or two. Your strength is consistency and clarity. The watch-out? Being too rigid can cause stress when life throws surprises — and you may miss joy in the present.',
    tip: '💡 Coach Tip: Build a "flexibility buffer" into your budget. Life is not always predictable — a small contingency fund lets you stay on track without feeling like you failed.'
  },
  GIVER: {
    key: 'GIVER', label: 'The Giver', emoji: '🤲',
    desc: 'Helping others financially brings you deep satisfaction. You are generous, caring, and community-minded. But if giving comes before saving, you may find yourself financially vulnerable when you need support. Your generosity is a gift — it just needs boundaries to be sustainable.',
    tip: '💡 Coach Tip: Think of saving for yourself as an act of giving to your future self. You cannot pour from an empty cup — secure your own financial foundation first.'
  }
};

// ── 8 QUESTIONS ──────────────────────────────────────────────────────────────
const questions = [
  {
    text: "When you get an unexpected $500, what's most likely to happen?",
    answers: [
      { label: "I treat myself — I've earned it.", type: 'SPENDER' },
      { label: "It goes straight into savings. No question.", type: 'PENNY_PINCHER' },
      { label: "It sits in my account and I'm not sure what to do with it.", type: 'AVOIDER' },
      { label: "I allocate it across my savings goals and budget.", type: 'PLANNER' },
      { label: "I think about someone in my life who could use it.", type: 'GIVER' }
    ]
  },
  {
    text: "How do you feel about making a budget?",
    answers: [
      { label: "I make them but tend to overspend anyway.", type: 'SPENDER' },
      { label: "I love a budget. It's my safety net.", type: 'PENNY_PINCHER' },
      { label: "I keep putting it off. It feels too complicated.", type: 'AVOIDER' },
      { label: "Already done and I review it regularly.", type: 'PLANNER' },
      { label: "I budget, but I often give away what I planned to save.", type: 'GIVER' }
    ]
  },
  {
    text: "What best describes how money was handled growing up in your home?",
    answers: [
      { label: "Money was spent freely. Enjoy life now.", type: 'SPENDER' },
      { label: "Every penny was counted and saving was the top priority.", type: 'PENNY_PINCHER' },
      { label: "Money was a stressful topic nobody really talked about.", type: 'AVOIDER' },
      { label: "Budgets, goals, and financial discipline were the norm.", type: 'PLANNER' },
      { label: "Sharing and helping others financially was the highest value.", type: 'GIVER' }
    ]
  },
  {
    text: "My biggest money challenge right now is:",
    answers: [
      { label: "Spending too much on things I don't really need.", type: 'SPENDER' },
      { label: "Spending anything at all — it causes me anxiety.", type: 'PENNY_PINCHER' },
      { label: "Not knowing where my money actually goes.", type: 'AVOIDER' },
      { label: "Being too rigid and not allowing for life's surprises.", type: 'PLANNER' },
      { label: "Giving too much to others and not saving enough for myself.", type: 'GIVER' }
    ]
  },
  {
    text: "If you found out you had more debt than you realized, you would:",
    answers: [
      { label: "Feel bad, but probably still spend on a few comfort items.", type: 'SPENDER' },
      { label: "Panic and immediately cut everything to pay it off fast.", type: 'PENNY_PINCHER' },
      { label: "Feel overwhelmed and try not to think about it for now.", type: 'AVOIDER' },
      { label: "Build a clear payoff plan with specific targets and timelines.", type: 'PLANNER' },
      { label: "Worry about how it affects your ability to help the people you care about.", type: 'GIVER' }
    ]
  },
  {
    text: "When it comes to retirement savings, you:",
    answers: [
      { label: "Know you should save more — you just enjoy the present more.", type: 'SPENDER' },
      { label: "Have been saving for years and check it regularly.", type: 'PENNY_PINCHER' },
      { label: "Haven't really started — it feels far away and confusing.", type: 'AVOIDER' },
      { label: "Have a target number and a plan to hit it.", type: 'PLANNER' },
      { label: "Think about it, but family financial needs often come first.", type: 'GIVER' }
    ]
  },
  {
    text: "How often do you check or track your spending?",
    answers: [
      { label: "Rarely — I'd rather not know sometimes.", type: 'SPENDER' },
      { label: "Every day. I know exactly what's in every account.", type: 'PENNY_PINCHER' },
      { label: "Almost never. It makes me anxious.", type: 'AVOIDER' },
      { label: "Weekly, using a system I've had for a while.", type: 'PLANNER' },
      { label: "I track what I give more than what I spend on myself.", type: 'GIVER' }
    ]
  },
  {
    text: "What do you most want from your relationship with money?",
    answers: [
      { label: "Freedom to enjoy it without guilt.", type: 'SPENDER' },
      { label: "Security and a growing safety net.", type: 'PENNY_PINCHER' },
      { label: "To feel less stressed and overwhelmed by it.", type: 'AVOIDER' },
      { label: "Confidence that my future is fully covered.", type: 'PLANNER' },
      { label: "To give generously without sacrificing my own stability.", type: 'GIVER' }
    ]
  }
];

// ── APP STATE ─────────────────────────────────────────────────────────────────
let currentQ = -1;
let scores = { SPENDER: 0, PENNY_PINCHER: 0, AVOIDER: 0, PLANNER: 0, GIVER: 0 };
let selectedResult = null;

// ── RENDER ─────────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  if (currentQ === -1) renderIntro();
  else if (currentQ < questions.length) renderQuestion();
  else renderResult();
}

function renderIntro() {
  app.innerHTML = `
    <div class="intro">
      <div class="meta">
        <div class="meta-item"><span class="meta-icon">🕐</span> ~2 Minutes</div>
        <div class="meta-item"><span class="meta-icon">❓</span> 8 Questions</div>
        <div class="meta-item"><span class="meta-icon">🎯</span> 5 Personality Types</div>
      </div>
      <p style="color:#385263;font-size:15px;margin-bottom:22px;line-height:1.7;">
        Your money habits are shaped by your personality — and understanding them is the first step toward financial wellness. Take this quick assessment to discover your money personality and get personalized guidance.
      </p>
      <div class="personality-preview">
        <span class="personality-pill">🛍️ The Spender</span>
        <span class="personality-pill">🔒 The Penny Pincher</span>
        <span class="personality-pill">🙈 The Avoider</span>
        <span class="personality-pill">📋 The Planner</span>
        <span class="personality-pill">🤲 The Giver</span>
      </div>
      <button class="start-btn" onclick="startAssessment()">Start Assessment →</button>
    </div>
  `;
}

function renderQuestion() {
  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Question ${currentQ + 1} of ${questions.length}</span>
        <span>${pct}% complete</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-num">Question ${currentQ + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="answers">
      ${q.answers.map((a, i) => `
        <button class="answer-btn" onclick="selectAnswer('${a.type}')">${a.label}</button>
      `).join('')}
    </div>
  `;
}

function renderResult() {
  const topType = selectedResult || getTopType();
  const t = types[topType];
  const others = Object.keys(types).filter(k => k !== topType);

  app.innerHTML = `
    <div class="result">
      <div class="result-emoji">${t.emoji}</div>
      <div class="result-badge">Your Money Personality</div>
      <div class="result-type">${t.label}</div>
      <div class="result-desc">${t.desc}</div>
      <div class="result-tip">${t.tip}</div>

      <div class="other-types-title">Explore Other Types</div>
      <div class="other-types">
        ${others.map(k => `
          <button class="other-pill ${selectedResult === k ? 'active' : ''}" onclick="showOtherType('${k}')">
            ${types[k].emoji} ${types[k].label}
          </button>
        `).join('')}
      </div>

      <div class="cta-section">
        <p>Ready to take the next step in your financial wellness journey?</p>
        <a class="cta-btn" href="https://www.finpathwellness.com/coaching" target="_blank">Connect with a FinPath Coach</a>
        <button class="retake-btn" onclick="retake()">Retake Assessment</button>
      </div>
    </div>
  `;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function startAssessment() {
  currentQ = 0;
  scores = { SPENDER: 0, PENNY_PINCHER: 0, AVOIDER: 0, PLANNER: 0, GIVER: 0 };
  selectedResult = null;
  render();
}

function selectAnswer(type) {
  scores[type]++;
  currentQ++;
  render();
}

function getTopType() {
  return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
}

function showOtherType(key) {
  selectedResult = key;
  renderResult();
  app.scrollIntoView({ behavior: 'smooth' });
}

function retake() {
  currentQ = -1;
  scores = { SPENDER: 0, PENNY_PINCHER: 0, AVOIDER: 0, PLANNER: 0, GIVER: 0 };
  selectedResult = null;
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
